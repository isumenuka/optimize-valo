[/Script/ShooterGame.ShooterGameUserSettings]
; ============================================================
; OPTIMIZED FOR: Dell G5 5505 | Ryzen 5 4600H | RX 5600M
; Optimized by: Antigravity optimizer suite
; Original backed up in: "Orginal - WindowsClient" folder
; ============================================================

; --- Monitor ---
; Keep your original monitor ID so it doesn't reset on launch
DefaultMonitorDeviceID="MONITOR\\NCP005F\\{4d36e96e-e325-11ce-bfc1-08002be10318}\\0004"
DefaultMonitorIndex=0
LastConfirmedDefaultMonitorDeviceID="MONITOR\\NCP005F\\{4d36e96e-e325-11ce-bfc1-08002be10318}\\0004"
LastConfirmedDefaultMonitorIndex=0

; --- Display Mode ---
; FullscreenMode=0 = TRUE Fullscreen (lowest latency, no compositor overhead)
; NOT borderless windowed - that adds a full frame of GPU flip latency
LastConfirmedFullscreenMode=0
PreferredFullscreenMode=0
bShouldLetterbox=False
bLastConfirmedShouldLetterbox=False

; --- Resolution ---
; Full native 1080p - never lower resolution on a 15.6" display (it blurs text)
ResolutionSizeX=1920
ResolutionSizeY=1080
LastUserConfirmedResolutionSizeX=1920
LastUserConfirmedResolutionSizeY=1080
DesiredScreenWidth=1920
DesiredScreenHeight=1080
LastUserConfirmedDesiredScreenWidth=1920
LastUserConfirmedDesiredScreenHeight=1080

; --- FPS & Sync ---
; FrameRateLimit=0 = UNCAPPED (let the GPU run as fast as possible)
; VSync=False = OFF (VSync adds 1-2 frames of input lag - never use it in competitive)
FrameRateLimit=0.000000
bUseVSync=False
bUseDynamicResolution=False

; --- Multithreaded Rendering ---
; CRITICAL: Lets Valorant use all 6 cores of Ryzen 5 4600H instead of 1
; This is the single biggest in-config FPS gain on CPU-bound maps
bUseMultithreading=True

; --- Audio ---
; AudioQualityLevel=0 = Low (less CPU used for audio processing = more for rendering)
; Competitive players use this to hear footsteps more clearly too
AudioQualityLevel=0
LastConfirmedAudioQualityLevel=0

; --- HDR ---
; OFF - HDR processing costs GPU bandwidth and adds latency with no benefit in-game
bUseHDRDisplayOutput=False
HDRDisplayOutputNits=1000

; --- Benchmark cache (keep as -1 = auto) ---
LastRecommendedScreenWidth=-1.000000
LastRecommendedScreenHeight=-1.000000
LastCPUBenchmarkResult=-1.000000
LastGPUBenchmarkResult=-1.000000
LastGPUBenchmarkMultiplier=1.000000
WindowPosX=0
WindowPosY=0

[/Script/Engine.GameUserSettings]
; Do NOT use desired screen height (let the resolution settings above take full control)
bUseDesiredScreenHeight=False
